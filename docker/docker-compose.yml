# docker-compose.yml — orquestación del frontend (TanStack Start + Vite).
# Ejecuta desde la raíz: `docker compose -f docker/docker-compose.yml up`.
version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ferreinnova-app
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    restart: unless-stopped
