# Render Blueprint — https://render.com/docs/blueprint-spec
# Conecta tu repo en Render: New > Blueprint > selecciona este archivo.
services:
  - type: web
    name: ferreinnova
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /tienda
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: NODE_ENV
        value: production
      # Cliente (build + runtime SSR) — configura en el dashboard de Render
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_SUPABASE_PROJECT_ID
        sync: false
      # Servidor SSR
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_PROJECT_ID
        sync: false
